<!DOCTYPE html>
<html>
<head>
    <title>Test CORS</title>
</head>
<body>
    <h1>Testing CORS...</h1>
    <pre id="result">Loading...</pre>
    <script>
        async function test() {
            try {
                const response = await fetch('https://fundgz.1234567.com.cn/js/000961.js', {
                    method: 'GET',
                    headers: {
                        'Accept': '*/*',
                        'Referer': 'https://fund.eastmoney.com/'
                    }
                });
                const text = await response.text();
                document.getElementById('result').textContent = 'SUCCESS:\n' + text.substring(0, 200);
            } catch (e) {
                document.getElementById('result').textContent = 'ERROR:\n' + e.message;
            }
        }
        test();
    </script>
</body>
</html>
